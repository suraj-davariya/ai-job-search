# Docs-site build gate (docs/docs-site-build-prompt.md §8).
# Runs when the docs site OR the dashboard domain logic it copies from
# changes. A failing build, typecheck, or parity test blocks the merge —
# the docs cannot silently rot or lie about the product.
name: docs-site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "dashboard/lib/domain/**"
      - ".github/workflows/docs-site.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - "dashboard/lib/domain/**"
      - ".github/workflows/docs-site.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs-site dependencies
        run: npm ci

      # The parity test imports dashboard/lib/domain/* directly; its
      # date-fns/papaparse imports resolve from dashboard/node_modules.
      - name: Install dashboard dependencies (for the parity test)
        run: npm ci
        working-directory: dashboard

      - name: Typecheck
        run: npm run typecheck

      - name: Parity test (drift guard)
        run: npm test

      - name: Build (static export)
        run: npm run build

      - name: Assert export artifacts
        run: |
          test -f out/index.html
          test -f out/docs/index.html
          test -f out/api/search
          echo "static export OK"
