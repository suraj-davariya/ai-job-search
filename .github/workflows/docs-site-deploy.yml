# Deploy the docs-site to GitHub Pages.
#
# Sibling to docs-site.yml: that one is the *build gate* (typecheck + parity
# test + build, on every PR). This one *publishes* — it builds the static
# export with the project-page base path and pushes it to GitHub Pages, so
# https://suraj-davariya.github.io/ai-job-search/ serves docs-site/.
#
# DOCS_BASE_PATH=/ai-job-search is the one piece that makes a project page
# work: it rewrites every asset URL and the static search-index fetch under
# the repo-name subpath (see docs-site/next.config.mjs and app/layout.tsx).
name: docs-site-deploy

on:
  # Publish on every change to the site that lands on the default branch.
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "dashboard/lib/domain/**"
      - ".github/workflows/docs-site-deploy.yml"
  # Allow a manual redeploy from the Actions tab (e.g. after enabling Pages).
  workflow_dispatch:

# Least-privilege token: read the repo, write a Pages deployment, mint the
# OIDC token deploy-pages needs to authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deployments at once; let an in-flight one finish rather
# than cancelling it (a half-cancelled deploy can leave the site broken).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      # enablement: true turns Pages on via the API on first run, so no manual
      # Settings → Pages toggle is needed (requires the pages: write scope above).
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          DOCS_BASE_PATH: /ai-job-search

      # Jekyll would strip Next.js's _next/ folder (leading underscore). The
      # Pages artifact pipeline skips Jekyll, but .nojekyll makes that explicit
      # and survives any future change to the serving path.
      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      # Fail loudly here rather than shipping a broken site: the entry page,
      # the docs index, and the static search index must all exist.
      - name: Assert export artifacts
        run: |
          test -f out/index.html
          test -f out/docs/index.html
          test -f out/api/search
          echo "static export OK"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
