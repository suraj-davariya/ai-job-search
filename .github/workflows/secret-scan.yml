# Secret-scan gate — mitigates RISK-0001 (CRITICAL): a candidate's personal
# data or an API key getting committed. CareerForge keeps profiles, generated
# documents, and the tracker on the user's machine and gitignored; this gate is
# the backstop if .gitignore is ever bypassed. It scans the working tree on
# every push/PR and fails the build if gitleaks finds a credential.
#
# Uses the gitleaks binary directly (no Action license needed). It scans the
# git history (`gitleaks git`), so it only sees tracked content — gitignored
# build artifacts (node_modules/, .next/) and personal data never reach it,
# avoiding the false positives a filesystem scan produces. fetch-depth: 0 gives
# gitleaks the full commit history to scan.
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan git history for secrets
        run: gitleaks git . --no-banner --redact --verbose
